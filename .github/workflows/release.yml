name: Build & Release APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v3.3.0)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build aiope-remote installer
        run: |
          cd daemon
          go mod tidy
          bash scripts/build-installer.sh ${GITHUB_REF_NAME:-dev}
          mkdir -p ../feature-remote/src/main/assets
          cp dist/aiope-remote-installer.sh ../feature-remote/src/main/assets/

      - name: Create secrets.properties
        run: echo "GATEWAY_KEY=${{ secrets.GATEWAY_KEY }}" > secrets.properties

      - name: Create keystore.properties
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > xnet.keystore
          cat > keystore.properties << EOF
          storeFile=xnet.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew :app:assembleRelease -x spotlessCheck -x spotlessKotlinCheck

      - name: Rename APK
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK" "AIOPE-${VERSION}-release.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: AIOPE-*-release.apk

      - name: Create Release (if version provided)
        if: github.event.inputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: AIOPE-*-release.apk
          generate_release_notes: true
