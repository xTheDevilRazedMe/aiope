name: Hybrid Debug Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build aiope-remote installer
        run: |
          cd daemon
          go mod tidy
          bash scripts/build-installer.sh dev
          mkdir -p ../feature-remote/src/main/assets
          cp dist/aiope-remote-installer.sh ../feature-remote/src/main/assets/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: |
          ./gradlew :app:assembleDebug -PGATEWAY_KEY="${{ secrets.GATEWAY_KEY }}" -x spotlessCheck -x spotlessKotlinCheck

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-functional-apk
          path: app/build/outputs/apk/debug/*.apk
