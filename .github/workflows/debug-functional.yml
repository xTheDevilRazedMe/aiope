name: Hybrid Debug Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Go Daemon
        run: |
          cd daemon
          go build -o aiope-remote main.go
          mkdir -p ../app/src/main/assets
          cp aiope-remote ../app/src/main/assets/

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug -PGATEWAY_KEY="${{ secrets.GATEWAY_KEY }}"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: aiope-debug
          path: app/build/outputs/apk/debug/app-debug.apk
